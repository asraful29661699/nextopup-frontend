<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Dark Edition</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: marquee 15s linear infinite; }
        .hidden-page { display: none !important; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #000000; color: white; }
        .nav-shadow { box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        input { color: black; }
        /* প্যাকেজ বক্স স্টাইল */
        .pkg-box { border: 1px solid #1f2937; background: #111111; transition: all 0.2s; cursor: pointer; }
        .pkg-box:active { border-color: #eab308; transform: scale(0.98); }
    </style>
</head>
<body class="pb-24">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-black">
        <div class="bg-[#111111] w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center border border-gray-800">
            <img src="logo-main.png" alt="NexTopUp" class="h-20 mx-auto mb-6 object-contain">
            <h2 class="text-xl font-bold text-white mb-1 italic uppercase">NexTopUp</h2>
            <p class="text-gray-500 text-[10px] mb-10 font-bold uppercase tracking-widest">Login to Continue</p>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        <header class="bg-black p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-50">
            <div onclick="showPage('homePage')" class="flex items-center gap-2.5 cursor-pointer">
                <img src="file_00000000c9787208b660aa071e1c6022.png" alt="Logo" class="h-10 w-10 object-contain rounded-lg">
                <div class="flex flex-col">
                    <span class="text-white font-black text-lg leading-none italic uppercase tracking-tight">NEXT<span class="text-yellow-500">TOPUP</span></span>
                    <span class="text-[7px] text-gray-400 uppercase mt-1 tracking-tighter">Premium Gaming Store</span>
                </div>
            </div>
            <div class="bg-[#111111] text-yellow-500 px-3 py-1.5 rounded-full font-bold flex items-center gap-2 text-xs border border-gray-700">
                <i class="fa-solid fa-wallet text-white text-[10px]"></i> ৳ ০.০০
            </div>
        </header>

        <div id="homePage" class="page-content p-4">
            <div class="bg-gradient-to-br from-[#111111] to-black rounded-[2rem] p-7 shadow-2xl border border-gray-800 mb-6">
                <h2 class="text-white font-extrabold text-2xl leading-snug">হ্যালো, <span id="userName" class="text-yellow-400">User</span>!</h2>
                <p class="text-gray-400 text-sm mt-1">আপনার প্রিয় গেম টপ-আপ করুন</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="openOrder('UID TOPUP')" class="bg-[#111111] rounded-3xl border border-gray-800 p-3 text-center">
                    <div class="bg-black rounded-2xl aspect-square flex items-center justify-center text-blue-500 mb-2"><i class="fa-solid fa-id-card text-3xl"></i></div>
                    <p class="text-[10px] font-extrabold text-gray-300 uppercase">UID TOPUP</p>
                </div>
                <div onclick="openOrder('WEEKLY/MONTHLY OFFER')" class="bg-[#111111] rounded-3xl border border-gray-800 p-3 text-center">
                    <div class="bg-black rounded-2xl aspect-square flex items-center justify-center text-yellow-500 mb-2 relative overflow-hidden">
                        <i class="fa-solid fa-crown text-3xl"></i>
                    </div>
                    <p class="text-[10px] font-extrabold text-gray-300 uppercase leading-none">Weekly/Monthly</p>
                </div>
            </div>
        </div>

        <div id="orderPage" class="page-content hidden-page p-4">
            <div class="bg-[#111111] rounded-3xl p-6 border border-gray-800 shadow-xl mb-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-10 w-10 bg-purple-600/20 rounded-xl flex items-center justify-center text-purple-500 font-bold">1</div>
                    <h3 id="orderTitle" class="font-bold text-white uppercase tracking-wider">Select Recharge</h3>
                </div>
                
                <div id="packageList" class="grid grid-cols-2 gap-3 mb-8">
                    </div>

                <div class="flex items-center gap-3 mb-6">
                    <div class="h-10 w-10 bg-purple-600/20 rounded-xl flex items-center justify-center text-purple-500 font-bold">2</div>
                    <h3 class="font-bold text-white uppercase tracking-wider">Account Info</h3>
                </div>
                <input type="text" placeholder="Enter Player ID" class="w-full bg-white p-4 rounded-2xl border-none mb-6 font-bold text-sm shadow-inner">
                
                <button class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95">Confirm Order</button>
            </div>
        </div>

        <div id="profilePage" class="page-content hidden-page p-4 text-center">
            <img id="userImg" src="" class="w-24 h-24 rounded-full border-4 border-yellow-500 mx-auto mb-4 object-cover">
            <h2 id="profileName" class="text-xl font-bold text-white italic">User</h2>
            <button onclick="logout()" class="w-full mt-6 bg-red-900/20 text-red-500 py-4 rounded-2xl font-bold border border-red-900/30">Logout</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-4 px-12 flex justify-between items-center z-50 rounded-t-3xl nav-shadow">
            <div onclick="showPage('homePage')" class="flex flex-col items-center gap-1 text-white cursor-pointer"><i class="fa-solid fa-house-chimney text-xl text-yellow-500"></i><span class="text-[9px] font-bold">Home</span></div>
            <div onclick="showPage('profilePage')" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer"><i class="fa-solid fa-circle-user text-xl"></i><span class="text-[9px] font-bold">Profile</span></div>
        </nav>
    </div>

    <script>
        window.onload = function() {
            const savedUser = localStorage.getItem('nexUser');
            if (savedUser) updateUI(JSON.parse(savedUser));
        };

        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            localStorage.setItem('nexUser', JSON.stringify(data));
            updateUI(data);
        }

        function updateUI(data) {
            document.getElementById('userName').innerText = data.given_name;
            document.getElementById('profileName').innerText = data.name;
            document.getElementById('userImg').src = data.picture;
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
        }

        function logout() { localStorage.removeItem('nexUser'); location.reload(); }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(pageId).classList.remove('hidden-page');
            window.scrollTo(0,0);
        }

        function openOrder(title) {
            document.getElementById('orderTitle').innerText = title;
            const pList = document.getElementById('packageList');
            pList.innerHTML = '';
            
            if(title === 'WEEKLY/MONTHLY OFFER') {
                // আপনার স্ক্রিনশটের মতো প্যাকেজগুলো
                const packs = [
                    { name: 'WEEKLY', price: '১৫৪' },
                    { name: '2X WEEKLY', price: '৩০৮' },
                    { name: '3X WEEKLY', price: '৪৬০' },
                    { name: 'MONTHLY', price: '৭৬৫' },
                    { name: '2X MONTHLY', price: '১৫৩০' },
                    { name: '1W + 1M', price: '৯১৫' }
                ];
                packs.forEach(p => {
                    pList.innerHTML += `
                        <div class="pkg-box rounded-xl p-4 text-center">
                            <p class="text-[10px] font-black text-blue-400 mb-1 uppercase">${p.name}</p>
                            <p class="text-[12px] font-black text-gray-400 italic">BDT ${p.price}</p>
                        </div>
                    `;
                });
            } else {
                pList.innerHTML = `<div class="pkg-box rounded-xl p-4 text-center col-span-2"><p class="text-xs font-bold text-blue-400 uppercase">115 Diamonds</p><p class="text-xs font-black text-gray-400">BDT 80</p></div>`;
            }
            showPage('orderPage');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer TopUp - Login Required</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fe; }
        .hidden-page { display: none !important; }
        .login-card { background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; }
    </style>
</head>
<body>

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-6 bg-blue-50">
        <div class="login-card">
            <div class="text-3xl font-black italic mb-2">
                <span class="text-blue-700">OFFER</span><span class="text-indigo-500">TOPUP</span>
            </div>
            <p class="text-xs text-gray-400 font-bold uppercase mb-8 tracking-widest">Login to Continue</p>
            
            <div id="g_id_onload"
                data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            
            <p class="mt-8 text-[10px] text-gray-400">By logging in, you agree to our Terms & Conditions</p>
        </div>
    </div>

    <div id="mainWebsite" class="hidden-page">
        <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
            <div class="text-xl font-black italic">
                <span class="text-blue-700">OFFER</span><span class="text-indigo-500">TOPUP</span>
            </div>
            <div class="flex items-center gap-2">
                <div id="userBalance" class="bg-blue-50 px-3 py-1 rounded-full text-blue-700 font-bold text-xs">৳ ০.০০</div>
                <img id="userImg" src="" class="w-8 h-8 rounded-full border-2 border-blue-100">
            </div>
        </header>

        <main class="p-4">
            <div class="bg-blue-600 p-8 rounded-[30px] text-white shadow-xl mb-6">
                <h2 class="text-xl font-bold">Welcome, <span id="userNameDisplay">User</span>!</h2>
                <p class="text-xs opacity-80">Ready for your next top-up?</p>
            </div>
            <p class="text-center text-gray-400 text-sm mt-20">লগইন সফল হয়েছে! এখন আপনি সার্ভিস ব্যবহার করতে পারবেন।</p>
        </main>
        
        <button onclick="logout()" class="fixed bottom-24 right-6 bg-red-500 text-white p-4 rounded-full shadow-lg">
            <i class="fa-solid fa-sign-out-alt"></i>
        </button>
    </div>

    <script>
        // গুগল লগইন রেসপন্স হ্যান্ডলার
        function handleCredentialResponse(response) {
            // টোকেন ডিকোড করা
            const responsePayload = JSON.parse(atob(response.credential.split('.')[1]));
            
            // ইউজার ডেটা সেভ করা
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userData', JSON.stringify(responsePayload));

            // ওয়েবসাইট ওপেন করা
            showWebsite(responsePayload);
        }

        function showWebsite(user) {
            document.getElementById('loginSection').classList.add('hidden-page');
            document.getElementById('mainWebsite').classList.remove('hidden-page');
            
            // ইউজারের নাম ও ছবি সেট করা
            document.getElementById('userNameDisplay').innerText = user.name;
            document.getElementById('userImg').src = user.picture;
        }

        // লগআউট সিস্টেম
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // পেজ লোড হওয়ার সময় চেক করা
        window.onload = function () {
            const loggedIn = localStorage.getItem('userLoggedIn');
            if (loggedIn === 'true') {
                const user = JSON.parse(localStorage.getItem('userData'));
                showWebsite(user);
            }
        }
    </script>
</body>
</html>

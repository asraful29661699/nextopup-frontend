<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer TopUp - Pro Store</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AUTH & DATA LOGIC ---
        window.handleCredentialResponse = (r) => {
            const user = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('nexUser', JSON.stringify(user));
            updateUI(user);
        };

        function updateUI(user) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('profileName').innerText = user.name;
            document.getElementById('userImg').src = user.picture;
            
            // ডাটাবেস থেকে ইউজারের ব্যালেন্স ও হিস্ট্রি লোড করা
            const userKey = user.email.replace('.', '_');
            onValue(ref(db, `users/${userKey}`), (s) => {
                const data = s.val() || { balance: 0, spent: 0, orders: 0 };
                document.getElementById('displayBal').innerText = '৳' + data.balance;
                document.getElementById('statSpent').innerText = '৳' + data.spent;
                document.getElementById('statOrders').innerText = data.orders;
                document.getElementById('statWallet').innerText = '৳' + data.balance;
            });
        }

        window.confirmOrder = () => {
            const pid = document.getElementById('playerID').value;
            if(!pid) return alert("Player ID দিন!");
            const u = JSON.parse(localStorage.getItem('nexUser'));
            
            push(ref(db, 'orders'), {
                ...window.activeProduct,
                playerID: pid,
                user: u.email,
                status: 'pending',
                time: new Date().toLocaleString()
            }).then(() => {
                alert("অর্ডার সফল হয়েছে!");
                document.getElementById('orderModal').style.display = 'none';
            });
        };

        window.onload = () => {
            const savedUser = localStorage.getItem('nexUser');
            if(savedUser) updateUI(JSON.parse(savedUser));
        };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fe; }
        .bg-premium { background: linear-gradient(135deg, #1e40af 0%, #6366f1 100%); }
        .nav-active { color: #1e40af; font-weight: 900; }
        #loginOverlay { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl text-center w-full max-w-sm border border-gray-100">
            <h1 class="text-3xl font-black italic mb-2 text-blue-800">OFFER<span class="text-indigo-500">TOPUP</span></h1>
            <p class="text-[10px] text-gray-400 font-black uppercase mb-8 tracking-widest">Login to Unlock Services</p>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="text-2xl font-black italic text-blue-700">OFFER<span class="text-indigo-500">TOPUP</span></div>
        <div class="flex items-center gap-3">
            <div class="bg-blue-50 px-4 py-2 rounded-full text-blue-700 font-black text-xs" id="displayBal">৳ ০.০০</div>
            <img id="userImg" src="" class="w-8 h-8 rounded-full border-2 border-blue-100">
        </div>
    </header>

    <main id="homePage" class="p-5 page-content">
        <div class="bg-premium p-8 rounded-[35px] text-white mb-8 shadow-xl relative overflow-hidden">
            <h1 class="text-2xl font-black">Hi, <span id="profileName">User</span>!</h1>
            <p class="text-[10px] uppercase font-bold opacity-80 mt-1 tracking-widest italic">Fastest Gaming Top-Up Service</p>
        </div>

        <h2 class="text-xs font-black uppercase text-gray-400 mb-4 tracking-widest border-l-4 border-blue-600 pl-3">Popular Services</h2>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="openProduct('Weekly Membership', 154)" class="bg-white p-4 rounded-[25px] text-center shadow-sm border border-gray-50">
                <img src="https://img.icons8.com/fluency/96/calendar.png" class="mx-auto mb-3 w-14">
                <p class="text-[10px] font-black uppercase">Weekly</p>
                <p class="text-blue-600 font-bold text-xs mt-1">৳১৫৪</p>
            </div>
            <div onclick="openProduct('Monthly Membership', 765)" class="bg-white p-4 rounded-[25px] text-center shadow-sm border border-gray-50">
                <img src="https://img.icons8.com/fluency/96/crown.png" class="mx-auto mb-3 w-14">
                <p class="text-[10px] font-black uppercase">Monthly</p>
                <p class="text-blue-600 font-bold text-xs mt-1">৳৭৬৫</p>
            </div>
        </div>
    </main>

    <main id="profilePage" class="hidden p-5 page-content">
        <div class="bg-white p-6 rounded-[30px] shadow-sm mb-6 text-center border border-gray-50">
            <div class="bg-green-100 text-green-600 text-[8px] px-3 py-1 rounded-full font-black uppercase inline-block mb-2">Account Verified</div>
            <h2 class="text-xl font-black text-gray-800">Your Statistics</h2>
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center border border-gray-50">
                <p id="statSpent" class="text-sm font-black text-blue-700">৳০</p>
                <p class="text-[7px] text-gray-400 uppercase font-black">Spent</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center border border-gray-50">
                <p id="statOrders" class="text-sm font-black text-indigo-700">০</p>
                <p class="text-[7px] text-gray-400 uppercase font-black">Orders</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center border border-gray-50">
                <p id="statWallet" class="text-sm font-black text-yellow-600">৳০</p>
                <p class="text-[7px] text-gray-400 uppercase font-black">Wallet</p>
            </div>
        </div>
    </main>

    <div id="orderModal" class="fixed inset-0 z-[100] items-end hidden bg-black/50" style="display: none;">
        <div class="bg-white w-full rounded-t-[40px] p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="orderTitle" class="text-lg font-black text-blue-900 uppercase italic">Weekly</h3>
                <button onclick="document.getElementById('orderModal').style.display='none'" class="text-gray-300 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            <input id="playerID" type="number" class="w-full bg-gray-50 p-5 rounded-2xl outline-none font-bold mb-6" placeholder="Enter Player ID (UID)">
            <button onclick="confirmOrder()" class="w-full bg-blue-700 text-white p-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-200">Buy Now</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-50">
        <button onclick="showPage('homePage')" class="nav-active flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[8px] font-black mt-1">HOME</span></button>
        <button onclick="showPage('profilePage')" class="text-gray-300 flex flex-col items-center"><i class="fa-solid fa-user"></i><span class="text-[8px] font-black mt-1">PROFILE</span></button>
    </nav>

    <script>
        window.openProduct = (n, p) => {
            window.activeProduct = {n, p};
            document.getElementById('orderTitle').innerText = n;
            document.getElementById('orderModal').style.display = 'flex';
        };
        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };
    </script>
</body>
        </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Multi-Functional Site</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            storageBucket: "nextopup-e6b28.firebasestorage.app",
            messagingSenderId: "603923590112",
            appId: "1:603923590112:web:c32feab3a13c683a569985",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ইউজার ফাংশন
        window.placeOrder = function(pkgName, price) {
            const playerID = document.getElementById('playerIDInput').value;
            const trxID = document.getElementById('trxIDInput').value;
            if(!playerID || !trxID) return alert("সব তথ্য দিন!");

            push(ref(db, 'orders'), {
                playerID, trxID, package: pkgName, price, status: 'pending', time: new Date().toLocaleString()
            }).then(() => {
                alert("অর্ডার সফল!");
                showPage('homePage');
            });
        };

        // অ্যাডমিন ড্যাশবোর্ড ডাটা
        window.loadAdminDashboard = function() {
            onValue(ref(db, 'orders'), (snapshot) => {
                const data = snapshot.val();
                let total = 0, pending = 0, completed = 0;
                const listUI = document.getElementById('liveOrderList');
                listUI.innerHTML = '';

                if(data) {
                    Object.keys(data).forEach(key => {
                        const o = data[key];
                        total++; 
                        if(o.status === 'pending') pending++;
                        else if(o.status === 'done') completed++;

                        listUI.innerHTML += `
                            <div class="bg-[#111] border border-gray-800 p-4 rounded-2xl mb-3 flex justify-between items-center">
                                <div>
                                    <p class="text-xs text-yellow-500 font-bold">ID: ${o.playerID}</p>
                                    <p class="text-[10px] text-gray-400">${o.package} - ৳${o.price}</p>
                                </div>
                                ${o.status === 'pending' ? `
                                    <button onclick="updateStatus('${key}', 'done')" class="bg-green-600/20 text-green-500 text-[10px] px-3 py-1 rounded-lg font-bold">DONE</button>
                                ` : `<span class="text-[9px] text-gray-500 uppercase">${o.status}</span>`}
                            </div>`;
                    });
                }
                document.getElementById('statTotalOrders').innerText = total;
                document.getElementById('statPending').innerText = pending;
                document.getElementById('statCompleted').innerText = completed;
            });
        };

        window.updateStatus = (id, status) => update(ref(db, 'orders/' + id), { status });
    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        .card-dark { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; }
    </style>
</head>
<body class="pb-24">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-black">
        <div class="text-center w-full">
            <h1 class="text-3xl font-black mb-10 text-yellow-500 italic">NEXT<span class="text-white">TOPUP</span></h1>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        
        <div id="homePage" class="page-content p-4">
            <div class="bg-blue-600 p-6 rounded-3xl mb-6">
                <h2 class="font-bold text-xl">হ্যালো, <span id="userName">User</span>!</h2>
                <p class="text-xs opacity-80">আপনার গেম আইডি টপ-আপ করুন দ্রুত</p>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="openOrder('UID TOPUP', '80')" class="card-dark text-center cursor-pointer">
                    <i class="fa-solid fa-id-card text-blue-500 mb-2 text-xl"></i>
                    <p class="text-[8px] font-bold">UID TOPUP</p>
                </div>
                <div onclick="openOrder('WEEKLY', '155')" class="card-dark text-center cursor-pointer">
                    <img src="https://img.icons8.com/color/96/diamond.png" class="h-6 mx-auto mb-2">
                    <p class="text-[8px] font-bold">WEEKLY</p>
                </div>
                <div onclick="openOrder('MONTHLY', '765')" class="card-dark text-center cursor-pointer">
                    <img src="https://img.icons8.com/fluency/96/diamond.png" class="h-6 mx-auto mb-2">
                    <p class="text-[8px] font-bold">MONTHLY</p>
                </div>
            </div>
        </div>

        <div id="adminPage" class="page-content hidden-page p-4">
            <h1 class="text-yellow-500 font-black italic text-xl mb-6">ADMIN PANEL</h1>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="card-dark">
                    <p id="statTotalOrders" class="text-2xl font-black">0</p>
                    <p class="text-[8px] text-gray-500 uppercase">Total Orders</p>
                </div>
                <div class="card-dark">
                    <p id="statPending" class="text-2xl font-black text-yellow-500">0</p>
                    <p class="text-[8px] text-gray-500 uppercase">Pending</p>
                </div>
                <div class="card-dark">
                    <p id="statCompleted" class="text-2xl font-black text-green-500">0</p>
                    <p class="text-[8px] text-gray-500 uppercase">Completed</p>
                </div>
                <div class="card-dark">
                    <p class="text-2xl font-black text-blue-500">১২৫</p>
                    <p class="text-[8px] text-gray-500 uppercase">Viewers</p>
                </div>
            </div>
            <div id="liveOrderList" class="space-y-3"></div>
        </div>

        <div id="profilePage" class="page-content hidden-page p-6 text-center">
            <img id="profileImg" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-yellow-500">
            <h3 id="profileName" class="text-xl font-black"></h3>
            <div class="mt-10 space-y-3">
                <button id="adminBtn" onclick="showPage('adminPage')" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black hidden uppercase">Admin Control</button>
                <button onclick="logout()" class="w-full bg-red-500/10 text-red-500 py-4 rounded-2xl text-xs font-bold uppercase">Logout</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-900 py-4 px-12 flex justify-between">
            <div onclick="showPage('homePage')" id="navHome" class="text-xl text-yellow-500 cursor-pointer"><i class="fa-solid fa-house"></i></div>
            <div onclick="showPage('profilePage')" id="navProfile" class="text-xl text-gray-600 cursor-pointer"><i class="fa-solid fa-circle-user"></i></div>
        </nav>
    </div>

    <div id="orderPage" class="page-content hidden-page fixed inset-0 bg-black p-6 z-[100]">
        <div class="card-dark">
            <h3 id="orderTitle" class="font-bold mb-4 text-center text-yellow-500 uppercase"></h3>
            <p class="text-[10px] text-center text-gray-500 mb-4 italic">বিকাশ/নগদ: 017XXXXXXXX (আপনার নম্বর দিন)</p>
            <input id="playerIDInput" type="text" placeholder="Player ID..." class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-3 text-sm">
            <input id="trxIDInput" type="text" placeholder="Transaction ID..." class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-6 text-sm">
            <button id="confirmBtn" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase">Confirm</button>
            <button onclick="showPage('homePage')" class="w-full text-xs text-gray-600 mt-4 font-bold">CANCEL</button>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "asraful29661693@gmail.com";
        window.handleCredentialResponse = (r) => {
            const d = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('nexUser', JSON.stringify(d));
            loginSuccess(d);
        };
        function loginSuccess(d) {
            document.getElementById('userName').innerText = d.given_name;
            document.getElementById('profileName').innerText = d.name;
            document.getElementById('profileImg').src = d.picture;
            if(d.email === ADMIN_EMAIL) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadAdminDashboard();
            }
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
        }
        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(id).classList.remove('hidden-page');
        };
        window.openOrder = (t, p) => {
            document.getElementById('orderTitle').innerText = t + " - ৳" + p;
            document.getElementById('confirmBtn').onclick = () => placeOrder(t, p);
            showPage('orderPage');
        };
        window.logout = () => { localStorage.removeItem('nexUser'); location.reload(); };
        window.onload = () => {
            const u = localStorage.getItem('nexUser');
            if(u) loginSuccess(JSON.parse(u));
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Admin Panel</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // আপনার প্রজেক্ট কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            storageBucket: "nextopup-e6b28.firebasestorage.app",
            messagingSenderId: "603923590112",
            appId: "1:603923590112:web:c32feab3a13c683a569985",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // অ্যাডমিন ডাটা এবং স্ট্যাটাস লোড
        window.loadAdminDashboard = function() {
            onValue(ref(db, 'orders'), (snapshot) => {
                const data = snapshot.val();
                let totalOrders = 0, pending = 0, completed = 0;
                const listUI = document.getElementById('liveOrderList');
                listUI.innerHTML = '';

                if(data) {
                    Object.keys(data).forEach(key => {
                        const o = data[key];
                        totalOrders++; 
                        if(o.status === 'pending') pending++;
                        else if(o.status === 'done') completed++;

                        listUI.innerHTML += `
                            <div class="bg-[#111] border border-gray-800 p-4 rounded-2xl mb-3 flex justify-between items-center">
                                <div>
                                    <p class="text-xs text-yellow-500 font-bold uppercase tracking-wider">ID: ${o.playerID}</p>
                                    <p class="text-[10px] text-gray-400 mt-1">${o.package} - ৳${o.price}</p>
                                    <p class="text-[9px] text-gray-600 mt-0.5">TrxID: ${o.trxID || 'N/A'}</p>
                                </div>
                                <div class="flex gap-2">
                                    ${o.status === 'pending' ? `
                                        <button onclick="updateStatus('${key}', 'done')" class="bg-green-600/20 text-green-500 text-[10px] px-4 py-2 rounded-xl font-bold">DONE</button>
                                        <button onclick="updateStatus('${key}', 'cancel')" class="bg-red-600/20 text-red-500 text-[10px] px-4 py-2 rounded-xl font-bold">EXIT</button>
                                    ` : `<span class="text-[9px] px-3 py-1 rounded-full ${o.status === 'done' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'} font-bold uppercase">${o.status}</span>`}
                                </div>
                            </div>`;
                    });
                } else {
                    listUI.innerHTML = `<p class="text-center text-gray-600 text-xs mt-10 italic">NO ORDERS AVAILABLE YET</p>`;
                }

                // স্ট্যাটাস কার্ডে ডাটা বসানো
                document.getElementById('statTotalOrders').innerText = totalOrders;
                document.getElementById('statPending').innerText = pending;
                document.getElementById('statCompleted').innerText = completed;
            });
        };

        window.updateStatus = (id, status) => update(ref(db, 'orders/' + id), { status: status });
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .card-dark { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; }
        .stat-label { font-size: 8px; color: #666; font-weight: 800; text-transform: uppercase; margin-top: 5px; }
        .stat-value { font-size: 24px; font-weight: 900; }
        .badge-pending { background: #332b00; color: #ffcc00; font-size: 10px; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-yellow-500 font-black italic text-xl italic tracking-tighter">ADMIN PANEL</h1>
            <p class="text-[8px] text-gray-600 font-bold tracking-widest uppercase">Real-time Statistics</p>
        </div>
        <button onclick="location.reload()" class="bg-[#111] text-gray-400 text-[10px] px-5 py-2 rounded-full font-bold border border-gray-800 uppercase">Exit</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="card-dark relative overflow-hidden">
            <i class="fa-solid fa-users text-blue-500 text-sm mb-2 opacity-50"></i>
            <p class="stat-value">১২৫</p>
            <p class="stat-label">Total Viewers</p>
            <span class="absolute top-3 right-4 bg-blue-500/10 text-blue-500 text-[6px] px-2 py-0.5 rounded font-bold">TODAY</span>
        </div>

        <div class="card-dark relative overflow-hidden">
            <i class="fa-solid fa-cart-shopping text-purple-500 text-sm mb-2 opacity-50"></i>
            <p id="statTotalOrders" class="stat-value text-white">0</p>
            <p class="stat-label">Total Orders</p>
            <span class="absolute top-3 right-4 bg-purple-500/10 text-purple-500 text-[6px] px-2 py-0.5 rounded font-bold uppercase">Orders</span>
        </div>

        <div class="card-dark relative overflow-hidden border-green-900/30">
            <i class="fa-solid fa-circle-check text-green-500 text-sm mb-2 opacity-50"></i>
            <p id="statCompleted" class="stat-value text-green-500">0</p>
            <p class="stat-label">Completed</p>
            <span class="absolute top-3 right-4 bg-green-500/10 text-green-500 text-[6px] px-2 py-0.5 rounded font-bold uppercase">Done</span>
        </div>

        <div class="card-dark relative overflow-hidden border-yellow-900/30">
            <i class="fa-solid fa-hourglass-half text-yellow-500 text-sm mb-2 opacity-50"></i>
            <p id="statPending" class="stat-value text-yellow-500">0</p>
            <p class="stat-label">Pending</p>
            <span class="absolute top-3 right-4 bg-yellow-500/10 text-yellow-500 text-[6px] px-2 py-0.5 rounded font-bold uppercase">Waiting</span>
        </div>
    </div>

    <div class="px-2">
        <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-6 flex items-center">
            <span class="w-2 h-2 bg-yellow-500 rounded-full mr-2 animate-pulse"></span> Live Orders
        </h3>
        <div id="liveOrderList" class="space-y-4 text-center">
            <p class="text-gray-700 text-xs italic">Loading Live Data...</p>
        </div>
    </div>

    <script>
        window.onload = () => {
            // ইউজারের ইমেইল অ্যাডমিন কি না তা চেক করে ফাংশন কল করুন
            loadAdminDashboard();
        };
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexTopUp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- NAVBAR -->
<nav class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-xl font-bold text-blue-600">NexTopUp</h1>
</nav>

<!-- MAIN CARD -->
<section class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">
  <h2 class="text-2xl font-bold mb-4 text-center">Free Fire Top-Up</h2>

  <input id="uid" class="w-full border p-2 mb-3 rounded" placeholder="Enter UID">

  <select id="product" class="w-full border p-2 mb-3 rounded">
    <option value="100">100 Diamond - ৳80</option>
    <option value="210">210 Diamond - ৳160</option>
    <option value="530">530 Diamond - ৳400</option>
  </select>

  <input id="trx" class="w-full border p-2 mb-3 rounded" placeholder="Transaction ID (bKash/Nagad)">

  <button onclick="order()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
    Buy Now
  </button>

  <p id="status" class="text-green-600 mt-3 text-center"></p>
</section>

<!-- SCRIPT -->
<script>
async function order() {
  const uid = document.getElementById('uid').value;
  const product = document.getElementById('product').value;
  const trx = document.getElementById('trx').value;

  if(!uid || !trx){
    alert('সব তথ্য পূরণ করো');
    return;
  }

  const res = await fetch('https://nextopup-site-production.up.railway.app/create-order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ uid, product, trx })
  });

  const data = await res.json();
  document.getElementById('status').innerText = "Order ID: " + data.id;
}
</script>

</body>
</html>

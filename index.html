<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Premium Full UI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ডায়নামিক প্রাইস লোডিং
        window.loadPrices = function() {
            onValue(ref(db, 'prices'), (snapshot) => {
                window.currentPrices = snapshot.val() || { weekly: 154, monthly: 765 };
                if(document.getElementById('inputWeekly')) {
                    document.getElementById('inputWeekly').value = window.currentPrices.weekly;
                    document.getElementById('inputMonthly').value = window.currentPrices.monthly;
                }
            });
        };

        // অ্যাডমিন থেকে দাম আপডেট
        window.updatePrices = function() {
            const w = document.getElementById('inputWeekly').value;
            const m = document.getElementById('inputMonthly').value;
            set(ref(db, 'prices'), { weekly: w, monthly: m })
                .then(() => alert("দাম আপডেট সফল!"));
        };

        // ভিডিওর মতো প্যাকেজ সিলেকশন
        window.openRecharge = function(type) {
            const p = window.currentPrices;
            const list = type === 'weekly' ? 
                [{n:"WEEKLY", p:p.weekly}, {n:"2X WEEKLY", p:p.weekly*2}, {n:"3X WEEKLY", p:p.weekly*3}] :
                [{n:"MONTHLY", p:p.monthly}, {n:"2X MONTHLY", p:p.monthly*2}, {n:"1W+1M", p:parseInt(p.weekly)+parseInt(p.monthly)}];
            
            let html = `<div class="grid grid-cols-2 gap-3">`;
            list.forEach(item => {
                html += `<button onclick="selectPkg('${item.n}', ${item.p})" class="pkg-btn border border-gray-800 p-4 rounded-xl text-center bg-[#111]">
                            <p class="text-[10px] font-black text-blue-500">${item.n}</p>
                            <p class="text-[10px] text-gray-400 mt-1">BDT ${item.p}</p>
                         </button>`;
            });
            document.getElementById('pkgList').innerHTML = html + `</div>`;
            document.getElementById('orderSheet').classList.remove('hidden-page');
        };

        window.selectPkg = (n, p) => {
            window.activeOrder = { n, p };
            document.getElementById('accInfo').classList.remove('hidden-page');
        };

        window.submitOrder = () => {
            const id = document.getElementById('playerID').value;
            if(!id) return alert("Player ID দিন!");
            push(ref(db, 'orders'), { ...window.activeOrder, playerID: id, status: 'pending' })
                .then(() => { alert("অর্ডার সফল!"); location.reload(); });
        };
    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        .top-nav { background: #000; border-bottom: 1px solid #111; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .service-card { background: #0c0c0c; border: 1px solid #111; border-radius: 25px; padding: 10px; text-align: center; }
        .service-card img { width: 100%; border-radius: 20px; margin-bottom: 8px; }
        
        /* ভিডিওর মতো বটম শিট */
        #orderSheet { position: fixed; bottom: 0; left: 0; right: 0; background: #080808; border-radius: 30px 30px 0 0; padding: 30px 20px; z-index: 1000; border-top: 1px solid #222; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #444; font-size: 20px; text-align: center; }
        .nav-item.active { color: #eab308; }
    </style>
</head>
<body class="pb-28">

    <div id="mainUI">
        <div class="top-nav">
            <div class="text-xl font-black italic tracking-tighter">
                <span style="color: #3b82f6;">NEX</span><span style="color: #eab308;">TOPUP</span>
            </div>
            <div class="bg-[#111] px-4 py-2 rounded-xl text-yellow-500 font-black text-xs border border-gray-800">৳ ০.০০</div>
        </div>

        <div id="homePage" class="p-4">
            <div class="bg-blue-600 p-8 rounded-[35px] mb-8">
                <h2 class="text-2xl font-black italic">হ্যালো, আসরাফুল!</h2>
                <p class="text-[10px] opacity-70 uppercase font-bold">আপনার প্রিয় গেম টপ-আপ করুন দ্রুত</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="openRecharge('weekly')" class="service-card">
                    <img src="weekly_thumb.png">
                    <p class="text-[9px] font-black uppercase">Weekly Membership</p>
                </div>
                <div onclick="openRecharge('monthly')" class="service-card">
                    <img src="monthly_thumb.png">
                    <p class="text-[9px] font-black uppercase">Monthly Membership</p>
                </div>
            </div>
        </div>

        <div id="adminPage" class="hidden-page p-4">
            <h1 class="text-yellow-500 font-black mb-6">ADMIN PANEL</h1>
            <input id="inputWeekly" type="number" class="w-full bg-[#111] p-4 rounded-xl mb-3 border border-gray-800" placeholder="Weekly Price">
            <input id="inputMonthly" type="number" class="w-full bg-[#111] p-4 rounded-xl mb-3 border border-gray-800" placeholder="Monthly Price">
            <button onclick="updatePrices()" class="w-full bg-blue-600 p-4 rounded-xl font-black">UPDATE PRICES</button>
        </div>
    </div>

    <div id="orderSheet" class="hidden-page">
        <div class="flex justify-between items-center mb-6">
            <p class="font-black text-sm uppercase tracking-widest text-gray-400">1 Select Package</p>
            <button onclick="document.getElementById('orderSheet').classList.add('hidden-page')" class="text-gray-500"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div id="pkgList"></div>
        <div id="accInfo" class="hidden-page mt-8 pt-6 border-t border-gray-900">
            <p class="font-black text-sm uppercase mb-4 text-gray-400">2 Account Info</p>
            <input id="playerID" type="text" class="w-full bg-[#111] p-4 rounded-xl border border-gray-800 font-bold" placeholder="Player ID">
            <button onclick="submitOrder()" class="w-full bg-blue-600 p-4 rounded-2xl font-black mt-4 shadow-lg shadow-blue-900/20">BUY NOW</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="location.reload()" class="nav-item active"><i class="fa-solid fa-house"></i><p class="text-[8px] font-black mt-1">HOME</p></div>
        <div onclick="document.getElementById('homePage').classList.add('hidden-page'); document.getElementById('adminPage').classList.remove('hidden-page');" class="nav-item"><i class="fa-solid fa-user-gear"></i><p class="text-[8px] font-black mt-1">ADMIN</p></div>
    </nav>

    <script>
        window.onload = () => { loadPrices(); };
    </script>
</body>
</html>

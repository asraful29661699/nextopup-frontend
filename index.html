<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Admin Control Center</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden-page { display: none !important; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #000000; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* Dashboard Cards */
        .admin-stat-card { 
            background: linear-gradient(145deg, #111111, #050505); 
            border: 1px solid #1f2937; 
            border-radius: 1.2rem; 
            padding: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        
        .service-card { background: #111111; border-radius: 1.5rem; padding: 1rem; text-align: center; border: 1px solid #1f2937; transition: all 0.3s ease; cursor: pointer; }
        .icon-box { background: #000000; border-radius: 1rem; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; border: 1px solid #333; overflow: hidden; }
        .greeting-card { background: linear-gradient(135deg, #1e3a8a, #3b82f6); border-radius: 1.5rem; margin-bottom: 1.5rem; }
        .nav-bar { background: #000000; border-top: 1px solid #1f2937; }
        
        .order-row { background: #0a0a0a; border: 1px solid #1f2937; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="pb-24">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-black">
        <div class="w-full max-w-sm text-center">
            <img src="logo-main.png" alt="NexTopUp" class="h-24 mx-auto mb-10 object-contain">
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        <header class="bg-black p-4 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
            <div onclick="showPage('homePage')" class="flex items-center gap-2 cursor-pointer">
                <img src="file_00000000c9787208b660aa071e1c6022.png" alt="Logo" class="h-8 w-8 rounded">
                <h1 class="text-white font-bold text-sm">NEXT<span class="text-yellow-500">TOPUP</span></h1>
            </div>
            <div class="bg-[#111111] text-yellow-500 px-3 py-1 rounded-full font-bold text-xs border border-gray-800 flex items-center gap-2">
                ৳ ০.০০
            </div>
        </header>

        <div id="homePage" class="page-content p-4">
            <div class="greeting-card p-6 shadow-2xl">
                <h2 class="text-white text-xl font-bold">হ্যালো, <span id="userName">User</span>!</h2>
                <p class="text-blue-100 text-xs mt-1">আপনার প্রিয় গেম টপ-আপ করুন</p>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="openOrder('UID TOPUP')" class="service-card"><div class="icon-box"><i class="fa-solid fa-id-card text-xl text-blue-500"></i></div><p class="text-[8px] font-bold text-gray-400 uppercase">UID TOPUP</p></div>
                <div onclick="openOrder('WEEKLY')" class="service-card"><div class="icon-box"><img src="oss-a4dc82551f55d986ea4bab3e8521c172.png" class="w-full h-full object-cover"></div><p class="text-[8px] font-bold text-gray-400 uppercase">WEEKLY</p></div>
                <div onclick="openOrder('MONTHLY')" class="service-card"><div class="icon-box"><img src="image_e070115c-7d67-479a-9312-39fd04c46b12.png" class="w-full h-full object-cover"></div><p class="text-[8px] font-bold text-gray-400 uppercase">MONTHLY</p></div>
            </div>
        </div>

        <div id="adminPage" class="page-content hidden-page p-4 bg-black min-h-screen">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-black text-yellow-500 uppercase italic">Admin Panel</h2>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Real-time Statistics</p>
                </div>
                <button onclick="showPage('homePage')" class="bg-gray-900 border border-gray-800 text-white text-[10px] px-4 py-2 rounded-full font-bold uppercase">Exit</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="admin-stat-card">
                    <div class="flex justify-between items-start mb-2">
                        <i class="fa-solid fa-users text-blue-500 text-lg"></i>
                        <span class="text-[8px] bg-blue-500/10 text-blue-500 px-2 py-0.5 rounded font-bold">TODAY</span>
                    </div>
                    <p class="text-2xl font-black" id="statVisitors">০</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Total Viewers</p>
                </div>

                <div class="admin-stat-card">
                    <div class="flex justify-between items-start mb-2">
                        <i class="fa-solid fa-cart-shopping text-purple-500 text-lg"></i>
                        <span class="text-[8px] bg-purple-500/10 text-purple-500 px-2 py-0.5 rounded font-bold">ORDERS</span>
                    </div>
                    <p class="text-2xl font-black" id="statOrders">০</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Total Orders</p>
                </div>

                <div class="admin-stat-card border-green-900/30">
                    <div class="flex justify-between items-start mb-2">
                        <i class="fa-solid fa-circle-check text-green-500 text-lg"></i>
                        <span class="text-[8px] bg-green-500/10 text-green-500 px-2 py-0.5 rounded font-bold">DONE</span>
                    </div>
                    <p class="text-2xl font-black text-green-400" id="statCompleted">০</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Completed</p>
                </div>

                <div class="admin-stat-card border-yellow-900/30">
                    <div class="flex justify-between items-start mb-2">
                        <i class="fa-solid fa-hourglass-half text-yellow-500 text-lg"></i>
                        <span class="text-[8px] bg-yellow-500/10 text-yellow-500 px-2 py-0.5 rounded font-bold">WAITING</span>
                    </div>
                    <p class="text-2xl font-black text-yellow-400" id="statPending">০</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Pending</p>
                </div>
            </div>

            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></span> Live Orders
            </h3>
            <div id="adminOrderList" class="space-y-3">
                <p class="text-center text-gray-600 text-[10px] py-10 font-bold uppercase">No orders available yet</p>
            </div>
        </div>

        <div id="profilePage" class="page-content hidden-page p-6 text-center">
            <div class="w-24 h-24 bg-gray-900 rounded-full mx-auto mb-6 flex items-center justify-center border-2 border-yellow-500 overflow-hidden shadow-2xl">
                <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                <i id="profileIcon" class="fa-solid fa-user text-4xl text-yellow-500"></i>
            </div>
            <h3 class="text-2xl font-black mb-1" id="profileName">User Name</h3>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-10">Premium Customer</p>
            
            <div class="space-y-4">
                <button id="adminBtn" onclick="showPage('adminPage')" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-3 hidden">
                    <i class="fa-solid fa-shield-halved text-lg"></i> Admin Panel
                </button>
                <button onclick="logout()" class="w-full bg-red-500/10 border border-red-500/30 text-red-500 py-4 rounded-2xl font-bold uppercase text-xs">Logout Account</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 nav-bar py-4 px-10 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <div onclick="showPage('homePage')" class="flex flex-col items-center gap-1 text-yellow-500 cursor-pointer"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px] font-bold">HOME</span></div>
            <div onclick="showPage('profilePage')" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer"><i class="fa-solid fa-circle-user text-xl"></i><span class="text-[9px] font-bold">PROFILE</span></div>
        </nav>
    </div>

    <script>
        const ADMIN_EMAIL = "asraful29661693@gmail.com"; 

        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            localStorage.setItem('nexUser', JSON.stringify(data));
            loginSuccess(data);
        }

        function loginSuccess(data) {
            document.getElementById('userName').innerText = data.given_name;
            document.getElementById('profileName').innerText = data.name;
            
            if(data.email === ADMIN_EMAIL) {
                document.getElementById('adminBtn').classList.remove('hidden');
            }

            if (data.picture) {
                document.getElementById('profileImg').src = data.picture;
                document.getElementById('profileImg').classList.remove('hidden');
                document.getElementById('profileIcon').classList.add('hidden');
            }
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
            
            // সাইট ভিউ আপডেট (টেস্ট হিসেবে)
            updateStats();
        }

        function updateStats() {
            // আপাতত এগুলো ডামি ডাটা, পরে ডাটাবেজ লাগালে লাইভ হবে
            document.getElementById('statVisitors').innerText = '১২৫';
            document.getElementById('statOrders').innerText = '৪৭';
            document.getElementById('statCompleted').innerText = '৪০';
            document.getElementById('statPending').innerText = '০৭';
        }

        function logout() { localStorage.removeItem('nexUser'); location.reload(); }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(pageId).classList.remove('hidden-page');
            window.scrollTo(0,0);
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        window.onload = function() {
            const user = localStorage.getItem('nexUser');
            if(user) loginSuccess(JSON.parse(user));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Professional Store</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ভিডিওর মতো প্যাকেজ ডেটা
        const products = {
            weekly: [
                { name: "WEEKLY", price: 154 }, { name: "2X WEEKLY", price: 308 }, { name: "3X WEEKLY", price: 460 }
            ],
            monthly: [
                { name: "MONTHLY", price: 765 }, { name: "2X MONTHLY", price: 1530 }, { name: "1W+1M", price: 915 }
            ],
            diamond: [
                { name: "25 DIAMOND", price: 24 }, { name: "50 DIAMOND", price: 38 }, { name: "115 DIAMOND", price: 79 }
            ]
        };

        window.openProduct = (type) => {
            const list = products[type];
            let html = `<div class="grid grid-cols-2 gap-3 mb-6">`;
            list.forEach(item => {
                html += `<button onclick="selectItem('${item.name}', ${item.price})" class="item-btn border border-gray-800 p-4 rounded-xl text-center bg-[#0c0c0c] hover:border-blue-500 transition-all">
                            <p class="text-[10px] font-black text-blue-500 uppercase">${item.name}</p>
                            <p class="text-[10px] text-gray-500 mt-1 italic">BDT ${item.price}</p>
                         </button>`;
            });
            document.getElementById('productOptions').innerHTML = html + `</div>`;
            document.getElementById('orderModal').classList.remove('hidden-page');
        };

        window.selectItem = (name, price) => {
            window.currentOrder = { name, price };
            document.getElementById('orderForm').classList.remove('hidden-page');
            document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-900/10'));
            event.currentTarget.classList.add('border-blue-500', 'bg-blue-900/10');
        };

        window.submitOrder = () => {
            const pid = document.getElementById('playerID').value;
            const pay = document.querySelector('input[name="payment"]:checked')?.value;
            if(!pid || !pay) return alert("Player ID এবং Payment Method সিলেক্ট করুন!");
            
            push(ref(db, 'orders'), { ...window.currentOrder, playerID: pid, payment: pay, status: 'pending' })
                .then(() => { alert("অর্ডার সফল হয়েছে!"); location.reload(); });
        };
    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .top-nav { background: #000; border-bottom: 1px solid #111; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .hero-banner { background: linear-gradient(45deg, #1d4ed8, #1e40af); border-radius: 35px; padding: 30px; margin: 20px; text-align: center; }
        .service-card { background: #0c0c0c; border: 1px solid #111; border-radius: 20px; padding: 12px; transition: 0.3s; cursor: pointer; }
        .service-card:active { transform: scale(0.95); }
        .service-card img { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        
        /* ভিডিওর স্টাইল অনুযায়ী বটম শীট */
        #orderModal { position: fixed; bottom: 0; left: 0; right: 0; background: #080808; border-radius: 30px 30px 0 0; padding: 30px 20px; z-index: 1000; border-top: 2px solid #1e40af; max-height: 90vh; overflow-y: auto; }
        .pay-box { border: 1px solid #222; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .pay-box input:checked + div { border-color: #3b82f6; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .nav-item { text-align: center; color: #444; flex: 1; }
        .nav-item.active { color: #3b82f6; }
    </style>
</head>
<body class="pb-32">

    <div class="top-nav">
        <div class="text-2xl font-black italic tracking-tighter">
            <span class="text-blue-600">OFFER</span><span class="text-yellow-500">TOPUP</span>
        </div>
        <div class="bg-[#111] px-4 py-2 rounded-full border border-gray-800 flex items-center gap-2">
            <i class="fa-solid fa-wallet text-yellow-500 text-xs"></i>
            <span class="text-xs font-bold">৳ ০.০০</span>
        </div>
    </div>

    <div id="homePage">
        <div class="hero-banner shadow-2xl shadow-blue-900/20">
            <h1 class="text-2xl font-black italic">Special Offer!</h1>
            <p class="text-[10px] uppercase font-bold opacity-70 tracking-widest mt-1">Top up today, stay ahead tomorrow</p>
        </div>

        <div class="p-6">
            <h2 class="text-[10px] font-black uppercase text-gray-500 tracking-[0.3em] mb-6 border-l-4 border-blue-600 pl-3">Free Fire Services</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="openProduct('weekly')" class="service-card shadow-lg">
                    <img src="weekly_thumb.png">
                    <p class="text-[9px] font-black uppercase">Weekly Membership</p>
                </div>
                <div onclick="openProduct('monthly')" class="service-card shadow-lg">
                    <img src="monthly_thumb.png">
                    <p class="text-[9px] font-black uppercase">Monthly Membership</p>
                </div>
                <div onclick="openProduct('diamond')" class="service-card shadow-lg col-span-2 flex items-center gap-4 p-4">
                    <div class="w-16"><img src="diamond_thumb.png" class="m-0"></div>
                    <p class="text-[12px] font-black uppercase">Instant Diamond Topup</p>
                </div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="hidden-page">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-lg font-black italic text-blue-500 uppercase">1 Select Package</h3>
            <button onclick="document.getElementById('orderModal').classList.add('hidden-page')" class="text-gray-500 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>

        <div id="productOptions"></div>

        <div id="orderForm" class="hidden-page mt-10 pt-8 border-t border-gray-900">
            <h3 class="text-sm font-black uppercase text-gray-400 mb-4">2 Account Info</h3>
            <input id="playerID" type="number" class="w-full bg-[#111] p-5 rounded-2xl border border-gray-800 font-bold mb-8 focus:border-blue-600 transition-all outline-none" placeholder="Enter Player ID">

            <h3 class="text-sm font-black uppercase text-gray-400 mb-4">3 Select Payment</h3>
            <div class="space-y-3">
                <label class="pay-box">
                    <input type="radio" name="payment" value="bkash" class="accent-pink-600">
                    <span class="text-xs font-bold uppercase ml-2">bKash (Auto Payment)</span>
                </label>
                <label class="pay-box">
                    <input type="radio" name="payment" value="nagad" class="accent-orange-500">
                    <span class="text-xs font-bold uppercase ml-2">Nagad (Manual)</span>
                </label>
            </div>

            <button onclick="submitOrder()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black mt-8 shadow-xl shadow-blue-900/30 uppercase tracking-widest text-xs">Confirm Order</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><p class="text-[8px] font-black mt-1">HOME</p></div>
        <div class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i><p class="text-[8px] font-black mt-1">ORDERS</p></div>
        <div class="nav-item"><i class="fa-solid fa-user-shield"></i><p class="text-[8px] font-black mt-1">PROFILE</p></div>
    </nav>

</body>
</html>

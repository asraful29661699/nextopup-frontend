<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: marquee 15s linear infinite; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-white p-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div onclick="showPage('home')" class="flex items-center gap-2 cursor-pointer">
            <div class="bg-[#6328e0] text-white p-2 rounded-lg font-bold">O</div>
            <span class="font-bold text-xl tracking-tighter uppercase">Offer <span class="text-[#6328e0]">Topup</span></span>
        </div>
        <div class="bg-purple-100 text-[#6328e0] px-3 py-1 rounded-full font-bold flex items-center gap-1 text-sm">
            <i class="fa-solid fa-wallet"></i> ৳০
        </div>
    </header>

    <div id="homePage">
        <div class="bg-[#6328e0] text-white text-[11px] py-2 overflow-hidden whitespace-nowrap">
            <div class="animate-marquee inline-block">১৮ বছরের নিচে কেউ অর্ডার করবেন না! ফ্যামিলির টাকা চুরি করে অর্ডার করলে ব্যবস্থা নেওয়া হবে!</div>
        </div>

        <div class="p-4">
            <div class="bg-gradient-to-r from-purple-800 to-indigo-900 rounded-2xl p-6 text-white shadow-lg">
                <h2 class="font-bold text-lg">গিভওয়ে ও সকল অফার</h2>
                <p class="text-xs text-yellow-400">টেলিগ্রাম চ্যানেলে জয়েন করুন</p>
            </div>
        </div>

        <div class="px-4 mt-4">
            <h3 class="text-center font-bold text-gray-800 mb-4 tracking-widest uppercase">Free Fire</h3>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="showPage('orderPage')" class="bg-white rounded-2xl shadow-sm border p-2 text-center cursor-pointer active:scale-95 transition-all">
                    <div class="bg-gradient-to-b from-indigo-500 to-purple-800 rounded-xl aspect-square flex flex-col items-center justify-center text-white mb-2">
                        <i class="fa-solid fa-id-card text-2xl"></i>
                    </div>
                    <p class="text-[10px] font-bold text-gray-700 uppercase leading-tight">UID TOPUP (BD)</p>
                </div>
                </div>
        </div>
    </div>

    <div id="orderPage" class="hidden-page p-4">
        <button onclick="showPage('home')" class="mb-4 text-[#6328e0] font-bold flex items-center gap-2">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </button>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
            <div class="bg-[#6328e0] p-4 text-white text-center">
                <h2 class="font-bold">UID TOPUP (BD)</h2>
            </div>
            
            <div class="p-5 space-y-6">
                <div>
                    <label class="font-bold text-gray-700 block mb-3">1. Select Recharge</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectPkg('115 Diamonds', 79, this)" class="pkg border-2 p-3 rounded-xl text-sm hover:border-[#6328e0]">
                            115 Diamonds <br> <span class="text-[#6328e0] font-bold">BDT 79</span>
                        </button>
                        <button onclick="selectPkg('240 Diamonds', 158, this)" class="pkg border-2 p-3 rounded-xl text-sm hover:border-[#6328e0]">
                            240 Diamonds <br> <span class="text-[#6328e0] font-bold">BDT 158</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="font-bold text-gray-700 block mb-2">2. Account Info</label>
                    <input id="playerID" class="w-full border-2 bg-gray-50 p-3 rounded-xl focus:border-[#6328e0] outline-none" placeholder="প্লেয়ার আইডি (UID) দিন">
                </div>

                <div>
                    <label class="font-bold text-gray-700 block mb-3">3. Select Payment</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="border-2 p-3 rounded-xl text-center opacity-50">Wallet Pay</div>
                        <div class="border-2 border-pink-500 p-3 rounded-xl text-center bg-pink-50 font-bold">Instant Pay</div>
                    </div>
                </div>

                <button onclick="confirmOrder()" class="w-full bg-[#6328e0] text-white py-4 rounded-2xl font-bold shadow-lg">Buy Now</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t py-3 px-6 flex justify-between items-center text-gray-400 z-50">
        <div onclick="showPage('home')" class="flex flex-col items-center gap-1 cursor-pointer">
            <i class="fa-solid fa-house"></i><span class="text-[9px]">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-file-invoice-dollar"></i><span class="text-[9px]">Add Money</span></div>
        <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-bookmark"></i><span class="text-[9px]">Orders</span></div>
        <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-user"></i><span class="text-[9px]">Account</span></div>
    </nav>

    <script>
        let selectedAmount = 0;

        function showPage(pageId) {
            document.getElementById('homePage').classList.add('hidden-page');
            document.getElementById('orderPage').classList.add('hidden-page');
            document.getElementById(pageId).classList.remove('hidden-page');
            window.scrollTo(0,0);
        }

        function selectPkg(name, price, btn) {
            selectedAmount = price;
            document.querySelectorAll('.pkg').forEach(b => b.classList.remove('border-[#6328e0]', 'bg-purple-50'));
            btn.classList.add('border-[#6328e0]', 'bg-purple-50');
        }

        function confirmOrder() {
            const id = document.getElementById('playerID').value;
            if(!id || selectedAmount === 0) return alert("তথ্য পূরণ করুন!");
            alert("অর্ডার সফল! আপনার খরচ: ৳" + selectedAmount);
        }
    </script>
</body>
</html>

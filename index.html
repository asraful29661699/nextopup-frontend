<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Payment Ready</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            storageBucket: "nextopup-e6b28.firebasestorage.app",
            messagingSenderId: "603923590112",
            appId: "1:603923590112:web:c32feab3a13c683a569985",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.placeOrder = function(pkgName, price) {
            const playerID = document.getElementById('playerIDInput').value;
            const trxID = document.getElementById('trxIDInput').value;
            
            if(!playerID || !trxID) return alert("Player ID এবং Transaction ID দুটোই দিন!");

            const orderRef = ref(db, 'orders');
            const newOrderRef = push(orderRef);
            set(newOrderRef, {
                playerID: playerID,
                trxID: trxID,
                package: pkgName,
                price: price,
                status: 'pending',
                time: new Date().toLocaleString()
            }).then(() => {
                alert("অর্ডার সফল! এডমিন চেক করে ২-৫ মিনিটের মধ্যে কমপ্লিট করে দিবে।");
                showPage('homePage');
            });
        };

        window.loadAdminData = function() {
            onValue(ref(db, 'orders'), (snapshot) => {
                const data = snapshot.val();
                let total = 0, pending = 0, completed = 0;
                const listUI = document.getElementById('adminOrderList');
                listUI.innerHTML = '';
                if(data) {
                    Object.keys(data).forEach(key => {
                        const o = data[key];
                        total++; 
                        if(o.status === 'pending') pending++;
                        else if(o.status === 'done') completed++;

                        listUI.innerHTML += `
                            <div class="bg-[#111] border border-gray-800 p-4 rounded-xl mb-3">
                                <p class="text-xs text-yellow-500 font-bold">ID: ${o.playerID}</p>
                                <p class="text-[10px] text-gray-400">TrxID: ${o.trxID}</p>
                                <p class="text-[10px] text-white mt-1">${o.package} - ৳${o.price}</p>
                                ${o.status === 'pending' ? `
                                <div class="flex gap-2 mt-3">
                                    <button onclick="updateStatus('${key}', 'done')" class="bg-green-600 text-[9px] flex-1 py-2 rounded font-bold">DONE</button>
                                    <button onclick="updateStatus('${key}', 'cancel')" class="bg-red-600 text-[9px] flex-1 py-2 rounded font-bold">CANCEL</button>
                                </div>` : `<p class="text-[9px] mt-2 text-green-500 font-bold uppercase">${o.status}</p>`}
                            </div>`;
                    });
                }
                document.getElementById('statTotal').innerText = total;
                document.getElementById('statPending').innerText = pending;
                document.getElementById('statCompleted').innerText = completed;
            });
        };

        window.updateStatus = function(id, status) {
            update(ref(db, 'orders/' + id), { status: status });
        };
    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        .card-bg { background: #111; border: 1px solid #1f2937; }
    </style>
</head>
<body class="pb-24">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-black">
        <div class="text-center w-full max-w-sm">
            <h1 class="text-3xl font-black mb-10 text-yellow-500 italic">NEXT<span class="text-white">TOPUP</span></h1>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        <div id="homePage" class="page-content p-4">
            <div class="bg-blue-600 p-6 rounded-3xl mb-6 shadow-xl">
                <h2 class="font-bold text-xl">হ্যালো, <span id="userName">User</span>!</h2>
                <p class="text-xs opacity-90">নিচের প্যাকেজগুলো থেকে অর্ডার করুন</p>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="openOrder('UID TOPUP', '80')" class="card-bg p-4 rounded-2xl text-center">
                    <i class="fa-solid fa-id-card text-blue-500 mb-2 text-xl"></i>
                    <p class="text-[8px] font-bold text-gray-400">UID TOPUP</p>
                </div>
                <div onclick="openOrder('WEEKLY', '155')" class="card-bg p-4 rounded-2xl text-center">
                    <img src="https://img.icons8.com/color/96/diamond.png" class="h-6 mx-auto mb-2">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">WEEKLY</p>
                </div>
                <div onclick="openOrder('MONTHLY', '765')" class="card-bg p-4 rounded-2xl text-center">
                    <img src="https://img.icons8.com/fluency/96/diamond.png" class="h-6 mx-auto mb-2">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">MONTHLY</p>
                </div>
            </div>
        </div>

        <div id="orderPage" class="page-content hidden-page p-4">
            <div class="card-bg p-6 rounded-3xl">
                <h3 id="orderTitle" class="font-bold mb-4 text-center text-yellow-500 uppercase"></h3>
                
                <div class="bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-xl mb-6 text-center">
                    <p class="text-[10px] text-gray-400 mb-1">নিচের নম্বরে টাকা পাঠান (Send Money)</p>
                    <p class="font-black text-white">বিকাশ/নগদ: 017XXXXXXXX</p>
                </div>

                <input id="playerIDInput" type="text" placeholder="গেম Player ID দিন..." class="w-full bg-black border border-gray-700 p-4 rounded-xl mb-3 text-sm">
                <input id="trxIDInput" type="text" placeholder="বিকাশ/নগদ TrxID দিন..." class="w-full bg-black border border-gray-700 p-4 rounded-xl mb-6 text-sm">
                
                <button id="confirmBtn" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black">CONFIRM ORDER</button>
                <button onclick="showPage('homePage')" class="w-full text-xs text-gray-500 mt-4 font-bold">CANCEL</button>
            </div>
        </div>

        <div id="adminPage" class="page-content hidden-page p-4">
            <h2 class="text-xl font-black text-yellow-500 mb-6">ADMIN PANEL</h2>
            <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                <div class="card-bg p-3 rounded-xl"><p id="statTotal">0</p><p class="text-[7px]">TOTAL</p></div>
                <div class="card-bg p-3 rounded-xl text-yellow-500"><p id="statPending">0</p><p class="text-[7px]">PENDING</p></div>
                <div class="card-bg p-3 rounded-xl text-green-500"><p id="statCompleted">0</p><p class="text-[7px]">DONE</p></div>
            </div>
            <div id="adminOrderList"></div>
            <button onclick="showPage('homePage')" class="w-full mt-4 text-xs text-gray-500">BACK</button>
        </div>

        <div id="profilePage" class="page-content hidden-page p-6 text-center">
            <img id="profileImg" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-yellow-500">
            <h3 id="profileName" class="text-xl font-black"></h3>
            <div class="mt-10 space-y-3">
                <button id="adminBtn" onclick="showPage('adminPage')" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black hidden uppercase">Admin Panel</button>
                <button onclick="logout()" class="w-full bg-red-500/10 text-red-500 py-4 rounded-2xl text-xs font-bold uppercase">Logout</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-4 px-12 flex justify-between">
            <div onclick="showPage('homePage')" id="navHome" class="text-xl text-yellow-500"><i class="fa-solid fa-house"></i></div>
            <div onclick="showPage('profilePage')" id="navProfile" class="text-xl text-gray-600"><i class="fa-solid fa-circle-user"></i></div>
        </nav>
    </div>

    <script>
        const ADMIN_EMAIL = "asraful29661693@gmail.com";

        window.handleCredentialResponse = (response) => {
            const data = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('nexUser', JSON.stringify(data));
            loginSuccess(data);
        };

        function loginSuccess(data) {
            document.getElementById('userName').innerText = data.given_name;
            document.getElementById('profileName').innerText = data.name;
            document.getElementById('profileImg').src = data.picture;
            if(data.email === ADMIN_EMAIL) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadAdminData();
            }
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
        }

        window.logout = () => { localStorage.removeItem('nexUser'); location.reload(); };

        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(id).classList.remove('hidden-page');
        };

        window.openOrder = (title, price) => {
            document.getElementById('orderTitle').innerText = title + " - ৳" + price;
            document.getElementById('confirmBtn').onclick = () => placeOrder(title, price);
            showPage('orderPage');
        };

        window.onload = () => {
            const user = localStorage.getItem('nexUser');
            if(user) loginSuccess(JSON.parse(user));
        };
    </script>
</body>
</html>

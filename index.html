<section class="max-w-md mx-auto mt-10 bg-white p-6 rounded-2xl shadow-xl">

  <h2 class="text-xl font-bold mb-4 text-center">Top-Up Now</h2>

  <!-- STEP 1 -->
  <div class="mb-4">
    <label class="text-sm text-gray-500">Player UID</label>
    <input id="uid" class="w-full border p-3 rounded-lg mt-1" placeholder="Enter UID">
  </div>

  <!-- STEP 2 -->
  <div class="mb-4">
    <label class="text-sm text-gray-500">Select Package</label>
    <div class="grid grid-cols-2 gap-3 mt-2">

      <button onclick="selectPackage('100')" class="pkg border p-3 rounded-lg hover:border-blue-500">
        100 💎 <br> ৳80
      </button>

      <button onclick="selectPackage('210')" class="pkg border p-3 rounded-lg hover:border-blue-500">
        210 💎 <br> ৳160
      </button>

    </div>
  </div>

  <!-- STEP 3 -->
  <div class="mb-4">
    <label class="text-sm text-gray-500">Payment Method</label>

    <div class="grid grid-cols-2 gap-3 mt-2">
      <button onclick="selectPay('bkash')" id="bkashBtn" class="border p-3 rounded-lg hover:border-pink-500">
        bKash
      </button>

      <button onclick="selectPay('nagad')" id="nagadBtn" class="border p-3 rounded-lg hover:border-orange-500">
        Nagad
      </button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="mb-4">
    <label class="text-sm text-gray-500">Transaction ID</label>
    <input id="trx" class="w-full border p-3 rounded-lg mt-1">
  </div>

  <button onclick="order()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold">
    Confirm Order
  </button>

  <p id="status" class="text-green-600 mt-3 text-center"></p>

</section>

<script>
let product = '';
let paymentMethod = '';

function selectPackage(p){
  product = p;
  document.querySelectorAll('.pkg').forEach(btn => btn.classList.remove('border-blue-500'));
  event.target.classList.add('border-blue-500');
}

function selectPay(method){
  paymentMethod = method;

  document.getElementById('bkashBtn').classList.remove('border-pink-500');
  document.getElementById('nagadBtn').classList.remove('border-orange-500');

  if(method === 'bkash'){
    document.getElementById('bkashBtn').classList.add('border-pink-500');
  } else {
    document.getElementById('nagadBtn').classList.add('border-orange-500');
  }
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Professional Store</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ১. লোড ডেটা (প্রাইস এবং ব্যালেন্স)
        window.loadAppData = (email) => {
            onValue(ref(db, `users/${email.replace('.', '_')}`), (s) => {
                const userData = s.val() || { balance: 0 };
                document.getElementById('userBal').innerText = '৳' + userData.balance;
                document.getElementById('walletBal').innerText = '৳' + userData.balance;
            });
            onValue(ref(db, 'prices'), (s) => { window.prices = s.val() || { weekly: 154, monthly: 765 }; });
        };

        // ২. অর্ডার লজিক (ভিডিওর মতো ধাপে ধাপে)
        window.openSheet = (type) => {
            const p = window.prices;
            const pkgs = type === 'weekly' ? 
                [{n:"1X Weekly", p:p.weekly}, {n:"2X Weekly", p:p.weekly*2}] : 
                [{n:"1X Monthly", p:p.monthly}, {n:"Weekly + Monthly", p:parseInt(p.weekly)+parseInt(p.monthly)}];
            
            let html = `<div class="grid grid-cols-2 gap-3">`;
            pkgs.forEach(i => {
                html += `<button onclick="selectPkg('${i.n}', ${i.p})" class="pkg-card border border-gray-800 p-4 rounded-xl bg-[#0c0c0c]">
                            <p class="text-[10px] font-black text-blue-500 uppercase">${i.n}</p>
                            <p class="text-[10px] text-gray-500 mt-1">BDT ${i.p}</p>
                         </button>`;
            });
            document.getElementById('pkgList').innerHTML = html + `</div>`;
            document.getElementById('orderSheet').classList.remove('hidden-page');
        };

        window.selectPkg = (n, p) => {
            window.activeOrder = { n, p };
            document.getElementById('inputArea').classList.remove('hidden-page');
            document.querySelectorAll('.pkg-card').forEach(b => b.classList.remove('border-blue-600'));
            event.currentTarget.classList.add('border-blue-600');
        };

        // ৩. পেমেন্ট ও অর্ডার সাবমিট
        window.placeOrder = () => {
            const pid = document.getElementById('playerID').value;
            if(!pid) return alert("Player ID দিন!");
            const u = JSON.parse(localStorage.getItem('nexUser'));
            
            push(ref(db, 'orders'), { 
                ...window.activeOrder, 
                playerID: pid, 
                user: u.email, 
                status: 'pending', 
                time: new Date().toLocaleString() 
            }).then(() => {
                alert("অর্ডার সফল! এডমিন চেক করছে।");
                location.reload();
            });
        };

        // ৪. অ্যাড মানি (সিম্পল ভেরিফিকেশন)
        window.addMoney = () => {
            const trnx = document.getElementById('trnxID').value;
            const amount = document.getElementById('addAmount').value;
            if(!trnx || !amount) return alert("সব তথ্য দিন!");
            
            push(ref(db, 'deposits'), { trnx, amount, user: JSON.parse(localStorage.getItem('nexUser')).email, status: 'pending' })
                .then(() => alert("অনুরোধ পাঠানো হয়েছে! এডমিন ট্রানজ্যাকশন চেক করে ব্যালেন্স যোগ করে দিবে।"));
        };

    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .nav-item { text-align: center; color: #444; flex: 1; transition: 0.3s; }
        .nav-item.active { color: #3b82f6; }
        .card { background: #0c0c0c; border: 1px solid #111; border-radius: 20px; overflow: hidden; }
        #orderSheet { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; border-radius: 30px 30px 0 0; padding: 30px 20px; border-top: 2px solid #1e40af; z-index: 1000; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body class="pb-32">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] text-center w-full max-w-sm">
            <h1 class="text-3xl font-black italic mb-2 text-black">OFFER<span class="text-blue-600">TOPUP</span></h1>
            <p class="text-xs text-gray-400 font-bold uppercase mb-8">Fastest Gaming Store</p>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        <div class="p-5 flex justify-between items-center border-b border-gray-900 sticky top-0 bg-black z-50">
            <div class="text-xl font-black italic">OFFER<span class="text-blue-600">TOPUP</span></div>
            <div class="bg-[#111] px-4 py-2 rounded-full border border-gray-800 text-xs font-black text-yellow-500" id="userBal">৳ ০.০০</div>
        </div>

        <div id="homePage" class="p-5 page-content">
            <div class="bg-blue-600 p-8 rounded-[35px] mb-8 shadow-2xl shadow-blue-900/20">
                <h2 class="text-2xl font-black italic">Hi, <span id="uName">User</span>!</h2>
                <p class="text-[9px] uppercase font-bold opacity-70 tracking-widest mt-1">Select your service & top up instantly</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="openSheet('weekly')" class="card p-3"><img src="weekly.png" class="rounded-xl mb-3"><p class="text-[9px] font-black uppercase text-center">Weekly Membership</p></div>
                <div onclick="openSheet('monthly')" class="card p-3"><img src="monthly.png" class="rounded-xl mb-3"><p class="text-[9px] font-black uppercase text-center">Monthly Membership</p></div>
            </div>
        </div>

        <div id="walletPage" class="hidden-page p-5 page-content">
            <div class="card p-8 text-center mb-6">
                <p class="text-xs text-gray-500 font-bold uppercase mb-2">Current Balance</p>
                <h1 class="text-4xl font-black text-yellow-500" id="walletBal">৳ ০.০০</h1>
            </div>
            <div class="card p-6">
                <p class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">Add Money (Manual)</p>
                <input id="addAmount" type="number" class="w-full bg-[#000] p-4 rounded-xl border border-gray-800 mb-3 outline-none" placeholder="Amount">
                <input id="trnxID" type="text" class="w-full bg-[#000] p-4 rounded-xl border border-gray-800 mb-4 outline-none" placeholder="bKash/Nagad TrnxID">
                <button onclick="addMoney()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-xs uppercase tracking-widest">Submit Request</button>
            </div>
        </div>

        <div id="orderSheet" class="hidden-page shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <p class="text-xs font-black uppercase text-gray-500 tracking-widest">1 Select Package</p>
                <button onclick="document.getElementById('orderSheet').classList.add('hidden-page')" class="text-gray-500 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            <div id="pkgList"></div>
            <div id="inputArea" class="hidden-page mt-8 pt-6 border-t border-gray-900">
                <p class="text-xs font-black uppercase text-gray-500 mb-4 tracking-widest">2 Account Info</p>
                <input id="playerID" type="number" class="w-full bg-[#111] p-5 rounded-2xl border border-gray-800 font-bold mb-4 outline-none" placeholder="Player ID">
                <button onclick="placeOrder()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest text-xs">Confirm Order</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div onclick="showPage('homePage')" id="nHome" class="nav-item active"><i class="fa-solid fa-house"></i><p class="text-[8px] font-black mt-1">HOME</p></div>
            <div onclick="showPage('walletPage')" id="nWallet" class="nav-item"><i class="fa-solid fa-wallet"></i><p class="text-[8px] font-black mt-1">WALLET</p></div>
            <div onclick="showPage('profilePage')" id="nUser" class="nav-item"><i class="fa-solid fa-circle-user"></i><p class="text-[8px] font-black mt-1">PROFILE</p></div>
        </nav>
    </div>

    <script>
        window.handleCredentialResponse = (r) => {
            const d = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('nexUser', JSON.stringify(d));
            login(d);
        };
        function login(d) {
            document.getElementById('uName').innerText = d.given_name;
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
            loadAppData(d.email);
        }
        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(id).classList.remove('hidden-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(id === 'homePage') document.getElementById('nHome').classList.add('active');
            if(id === 'walletPage') document.getElementById('nWallet').classList.add('active');
        };
        window.onload = () => {
            const u = localStorage.getItem('nexUser');
            if(u) login(JSON.parse(u));
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexTopUp Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    background:#06070d;
    color:white;
    font-family:sans-serif;
}

.hidden{display:none}

/* ===== TOP BAR ===== */

.topbar{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(10,10,15,.85);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

/* ===== GLASS ===== */

.glass{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

/* ===== NAV ===== */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:rgba(10,10,15,.95);
    backdrop-filter:blur(15px);
    border-top:1px solid rgba(255,255,255,.05);
    z-index:100;
}

.pkg.active{border:1px solid #a855f7;background:rgba(168,85,247,.12);}
.pay.active{border:1px solid #22c55e;background:rgba(34,197,94,.12);}

</style>
</head>

<body class="pb-28">

<!-- ================= HOME PAGE ================= -->
<div id="homePage">

<!-- TOPBAR -->
<div class="topbar px-4 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-black">
        <span class="text-purple-500">Nex</span><span class="text-yellow-400">TopUp</span>
    </h1>

</div>

<!-- CARDS -->
<section class="p-4">

    <div class="grid grid-cols-2 gap-3">

        <div onclick="openUIDPage()" class="glass p-5 rounded-3xl text-center cursor-pointer">
            <i class="fa-solid fa-gamepad text-3xl text-purple-500"></i>
            <p class="mt-2 font-bold">UID TopUp</p>
        </div>

        <div class="glass p-5 rounded-3xl text-center">
            <i class="fa-solid fa-calendar text-3xl text-yellow-400"></i>
            <p class="mt-2 font-bold">Weekly</p>
        </div>

        <div class="glass p-5 rounded-3xl text-center">
            <i class="fa-solid fa-crown text-3xl text-pink-500"></i>
            <p class="mt-2 font-bold">Monthly</p>
        </div>

        <div class="glass p-5 rounded-3xl text-center">
            <i class="fa-solid fa-bolt text-3xl text-green-400"></i>
            <p class="mt-2 font-bold">Evo Access</p>
        </div>

    </div>

</section>

</div>

<!-- ================= UID TOPUP PAGE ================= -->
<div id="uidPage" class="hidden">

<!-- TOP BAR -->
<div class="topbar px-4 py-4 flex justify-between items-center">

    <button onclick="goHome()" class="text-white">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <h2 class="font-black">UID TopUp</h2>

    <div></div>

</div>

<section class="p-4">

<div class="glass rounded-3xl p-5">

    <!-- UID -->
    <input id="uid" placeholder="Enter UID"
    class="w-full bg-black/30 p-4 rounded-2xl mb-4 outline-none">

    <!-- PACKAGES -->
    <div class="grid grid-cols-2 gap-3">

        <button onclick="selectPackage(this,'100')" class="pkg glass p-4 rounded-2xl">
            100 💎 - ৳80
        </button>

        <button onclick="selectPackage(this,'210')" class="pkg glass p-4 rounded-2xl">
            210 💎 - ৳160
        </button>

        <button onclick="selectPackage(this,'530')" class="pkg glass p-4 rounded-2xl">
            530 💎 - ৳400
        </button>

        <button onclick="selectPackage(this,'1080')" class="pkg glass p-4 rounded-2xl">
            1080 💎 - ৳780
        </button>

    </div>

    <!-- PAYMENT -->
    <div class="mt-4 grid grid-cols-2 gap-3">

        <button onclick="selectPay(this,'bkash')" class="pay glass p-4 rounded-2xl">
            bKash
        </button>

        <button onclick="selectPay(this,'nagad')" class="pay glass p-4 rounded-2xl">
            Nagad
        </button>

    </div>

    <!-- TRX -->
    <input id="trx" placeholder="Transaction ID"
    class="w-full bg-black/30 p-4 rounded-2xl mt-4 outline-none">

    <!-- BUTTON -->
    <button onclick="order()"
    class="w-full mt-4 bg-purple-600 py-4 rounded-2xl font-black">
        Confirm Order
    </button>

    <p id="status" class="text-center text-green-400 mt-3"></p>

</div>

</section>

</div>

<!-- ================= SCRIPT ================= -->
<script>

let selectedPackage='';
let paymentMethod='';

function openUIDPage(){
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('uidPage').classList.remove('hidden');
}

function goHome(){
    document.getElementById('uidPage').classList.add('hidden');
    document.getElementById('homePage').classList.remove('hidden');
}

function selectPackage(el,pack){
    selectedPackage=pack;
    document.querySelectorAll('.pkg').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
}

function selectPay(el,method){
    paymentMethod=method;
    document.querySelectorAll('.pay').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
}

async function order(){

    const uid=document.getElementById('uid').value;
    const trx=document.getElementById('trx').value;

    if(!uid||!trx||!selectedPackage||!paymentMethod){
        alert("Fill all fields");
        return;
    }

    document.getElementById('status').innerText="Processing...";

    const res=await fetch('https://nextopup-site-production.up.railway.app/create-order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({uid,product:selectedPackage,trx,paymentMethod})
    });

    const data=await res.json();

    document.getElementById('status').innerText=
    "Order Successful ID: "+data.id;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTopUp - Premium UI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4Lff3dPJvWnIMEdbJS0wIEWaBXNlBmro",
            authDomain: "nextopup-e6b28.firebaseapp.com",
            projectId: "nextopup-e6b28",
            storageBucket: "nextopup-e6b28.firebasestorage.app",
            messagingSenderId: "603923590112",
            appId: "1:603923590112:web:c32feab3a13c683a569985",
            databaseURL: "https://nextopup-e6b28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // প্যাকেজের দাম লোড করা
        window.loadPrices = function() {
            onValue(ref(db, 'prices'), (snapshot) => {
                const prices = snapshot.val() || { weekly: 190, monthly: 750 };
                document.getElementById('priceWeekly').innerText = '৳' + prices.weekly;
                document.getElementById('priceMonthly').innerText = '৳' + prices.monthly;
                
                // অ্যাডমিন ফিল্ডে বর্তমান দাম বসানো
                if(document.getElementById('inputWeekly')) {
                    document.getElementById('inputWeekly').value = prices.weekly;
                    document.getElementById('inputMonthly').value = prices.monthly;
                }
            });
        };

        // দাম আপডেট করা (Admin Only)
        window.updatePrices = function() {
            const w = document.getElementById('inputWeekly').value;
            const m = document.getElementById('inputMonthly').value;
            set(ref(db, 'prices'), { weekly: w, monthly: m })
                .then(() => alert("দাম আপডেট হয়েছে!"))
                .catch((e) => alert("Error: " + e.message));
        };

        window.loadAdminDashboard = function() {
            onValue(ref(db, 'orders'), (snapshot) => {
                const data = snapshot.val();
                let total = 0, pending = 0, completed = 0;
                const listUI = document.getElementById('liveOrderList');
                listUI.innerHTML = '';
                if(data) {
                    Object.keys(data).forEach(key => {
                        const o = data[key];
                        total++; 
                        if(o.status === 'pending') pending++;
                        else if(o.status === 'done') completed++;
                        listUI.innerHTML += `<div class="bg-[#111] border border-gray-800 p-4 rounded-2xl mb-3 flex justify-between items-center"><div><p class="text-xs text-yellow-500 font-bold uppercase">ID: ${o.playerID}</p><p class="text-[10px] text-gray-400 mt-1">${o.package} - ৳${o.price}</p></div><button onclick="updateStatus('${key}', 'done')" class="bg-green-600/20 text-green-500 text-[10px] px-3 py-1 rounded-lg font-bold">Done</button></div>`;
                    });
                }
                document.getElementById('statTotalOrders').innerText = total;
                document.getElementById('statPending').innerText = pending;
                document.getElementById('statCompleted').innerText = completed;
            });
        };
        window.updateStatus = (id, status) => update(ref(db, 'orders/' + id), { status });
    </script>

    <style>
        .hidden-page { display: none !important; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .service-card { background: #111; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .image-box { width: 100%; aspect-ratio: 1/1; background: #000; display: flex; align-items: center; justify-content: center; }
        .service-card img { width: 100%; height: 100%; object-fit: cover; }
        .service-card i { font-size: 40px; color: #3b82f6; }
        .title-box { padding: 8px 2px; text-align: center; background: #111; }
        .service-card p { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #efefef; }
        .price-tag { font-size: 8px; color: #eab308; font-weight: bold; margin-top: 2px; }

        .top-nav { background: #000; border-bottom: 1px solid #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { background: #1a1a1a; padding: 6px 12px; border-radius: 12px; border: 1px solid #222; color: #eab308; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { color: #444; text-align: center; flex: 1; }
        .nav-item.active { color: #eab308; }
        .nav-item i { font-size: 22px; }
        .nav-item p { font-size: 10px; font-weight: 800; margin-top: 4px; }
        
        .admin-input { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; width: 100%; color: white; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body class="pb-28">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-[#001529]">
        <div class="bg-white p-10 rounded-[45px] text-center w-full max-w-sm shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="text-4xl font-black italic tracking-tighter flex items-center">
                    <span style="color: #3b82f6;">Nex</span><span style="color: #eab308; margin-left: -2px;">TopUp</span>
                </div>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-1 border-t border-gray-100 pt-1">Top Up Today, Stay Ahead Tomorrow</p>
            </div>
            <div id="g_id_onload" data-client_id="267844479249-s4lk6u674rvsdkp8k94s8fnsseeuq751.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard"></div>
        </div>
    </div>

    <div id="mainUI" class="hidden-page">
        <div class="top-nav">
            <div class="text-xl font-black italic tracking-tighter">
                <span style="color: #3b82f6;">NEX</span><span style="color: #eab308;">TOPUP</span>
            </div>
            <div class="balance-box"><i class="fa-solid fa-wallet text-xs"></i> ৳ ০.০০</div>
        </div>

        <div id="homePage" class="page-content p-4">
            <div class="bg-gradient-to-br from-blue-700 to-blue-900 p-8 rounded-[35px] mb-8 shadow-2xl">
                <h2 class="text-2xl font-black italic">হ্যালো, <span id="userName">User</span>!</h2>
                <p class="text-xs opacity-80 mb-6 uppercase">আপনার প্রিয় গেম টপ-আপ করুন দ্রুত</p>
            </div>

            <h3 class="text-[10px] font-black uppercase mb-4 text-gray-500 border-l-4 border-yellow-500 pl-3">Free Fire Services</h3>
            <div class="services-grid">
                <div class="service-card shadow-lg">
                    <div class="image-box"><i class="fa-solid fa-id-card"></i></div>
                    <div class="title-box"><p>UID Topup</p></div>
                </div>
                <div class="service-card shadow-lg">
                    <div class="image-box"><img src="weekly_logo.png"></div>
                    <div class="title-box">
                        <p>Weekly</p>
                        <span id="priceWeekly" class="price-tag">৳---</span>
                    </div>
                </div>
                <div class="service-card shadow-lg">
                    <div class="image-box"><img src="monthly_logo.png"></div>
                    <div class="title-box">
                        <p>Monthly</p>
                        <span id="priceMonthly" class="price-tag">৳---</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="adminPage" class="page-content hidden-page p-4">
            <h1 class="text-yellow-500 font-black text-xl italic uppercase mb-6">Admin Control</h1>
            
            <div class="bg-[#0c0c0c] p-5 rounded-2xl border border-gray-900 mb-6">
                <p class="text-xs font-bold text-gray-400 uppercase mb-4">Update Package Prices</p>
                <div class="mb-4">
                    <label class="text-[10px] text-gray-500 uppercase">Weekly Price</label>
                    <input id="inputWeekly" type="number" class="admin-input" placeholder="Enter Weekly Price">
                </div>
                <div class="mb-4">
                    <label class="text-[10px] text-gray-500 uppercase">Monthly Price</label>
                    <input id="inputMonthly" type="number" class="admin-input" placeholder="Enter Monthly Price">
                </div>
                <button onclick="updatePrices()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Update Prices</button>
            </div>

            <div id="liveOrderList" class="space-y-3 pt-4 border-t border-gray-800"></div>
        </div>

        <nav class="nav-bar">
            <div onclick="showPage('homePage')" id="navHome" class="nav-item active"><i class="fa-solid fa-house"></i><p>Home</p></div>
            <div onclick="showPage('addMoneyPage')" id="navAdd" class="nav-item"><i class="fa-solid fa-circle-plus"></i><p>Add</p></div>
            <div onclick="showPage('ordersPage')" id="navOrders" class="nav-item"><i class="fa-solid fa-bookmark"></i><p>Orders</p></div>
            <div onclick="showPage('codesPage')" id="navCodes" class="nav-item"><i class="fa-solid fa-table-cells"></i><p>Codes</p></div>
            <div onclick="showPage('profilePage')" id="navProfile" class="nav-item"><i class="fa-solid fa-circle-user"></i><p>Profile</p></div>
        </nav>
    </div>

    <script>
        const ADMIN_EMAIL = "asraful29661693@gmail.com";
        window.handleCredentialResponse = (r) => {
            const d = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('nexUser', JSON.stringify(d));
            loginSuccess(d);
        };
        function loginSuccess(d) {
            document.getElementById('userName').innerText = d.given_name;
            loadPrices(); // দাম লোড হবে
            if(d.email === ADMIN_EMAIL) {
                document.getElementById('adminBtnArea')?.classList.remove('hidden-page');
                loadAdminDashboard();
            }
            document.getElementById('loginPage').classList.add('hidden-page');
            document.getElementById('mainUI').classList.remove('hidden-page');
        }
        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden-page');
            const map = { homePage:'navHome', adminPage:'navProfile' };
            if(map[id]) document.getElementById(map[id]).classList.add('active');
        };
        window.onload = () => {
            const u = localStorage.getItem('nexUser');
            if(u) loginSuccess(JSON.parse(u));
        };
    </script>
</body>
</html>
